# Build on every change; publish a GitHub Release (arm64 APK) on push to master.
name: CI & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test & assemble
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
      artifact_name: ${{ steps.ver.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-daemon

      - name: Assemble release APK
        # arm64 only; debug keystore (sideload). x86: build locally if needed.
        run: ./gradlew :app:assembleRelease --stacktrace --no-daemon

      - name: Read version
        id: ver
        run: |
          NAME=$(grep -E 'versionName\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SHORT_SHA="${GITHUB_SHA::7}"
          ARTIFACT="LiveTranslate-${NAME}-${SHORT_SHA}"
          {
            echo "version_name=$NAME"
            echo "short_sha=$SHORT_SHA"
            echo "artifact_name=$ARTIFACT"
          } >> "$GITHUB_OUTPUT"

      - name: Stage APK
        run: |
          mkdir -p dist
          NAME="${{ steps.ver.outputs.version_name }}"
          shopt -s nullglob
          apk=(app/build/outputs/apk/release/*arm64*.apk)
          if [ ${#apk[@]} -lt 1 ]; then
            echo "No arm64 APK under app/build/outputs/apk/release/"
            ls -laR app/build/outputs/apk || true
            exit 1
          fi
          cp "${apk[0]}" "dist/LiveTranslate-${NAME}-arm64.apk"
          ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.artifact_name }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.short_sha }}
          name: v${{ needs.build.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          files: dist/*.apk
          body: |
            `${{ needs.build.outputs.short_sha }}` · arm64 · debug-signed (sideload)

            Setup: see README (ASR / LLM keys).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
