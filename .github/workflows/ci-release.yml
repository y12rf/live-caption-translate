# Build on every change; publish a GitHub Release (with APKs) on push to master.
name: CI & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test & assemble
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      version_code: ${{ steps.ver.outputs.version_code }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
      artifact_name: ${{ steps.ver.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-daemon

      - name: Assemble release APKs
        # Release uses the debug keystore (sideload-friendly; see app/build.gradle.kts).
        run: ./gradlew :app:assembleRelease --stacktrace --no-daemon

      - name: Read version
        id: ver
        run: |
          NAME=$(grep -E 'versionName\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          CODE=$(grep -E 'versionCode\s*=' app/build.gradle.kts | head -1 | sed -E 's/[^0-9]//g')
          SHORT_SHA="${GITHUB_SHA::7}"
          ARTIFACT="LiveTranslate-${NAME}-${SHORT_SHA}"
          {
            echo "version_name=$NAME"
            echo "version_code=$CODE"
            echo "short_sha=$SHORT_SHA"
            echo "artifact_name=$ARTIFACT"
          } >> "$GITHUB_OUTPUT"
          echo "versionName=$NAME versionCode=$CODE artifact=$ARTIFACT"

      - name: Stage APK artifacts
        run: |
          mkdir -p dist
          NAME="${{ steps.ver.outputs.version_name }}"
          shopt -s nullglob
          for f in app/build/outputs/apk/release/*.apk; do
            base=$(basename "$f")
            # app-arm64-v8a-release.apk → LiveTranslate-1.1.0-arm64-v8a.apk
            abi=$(echo "$base" | sed -E 's/^app-(.+)-release\.apk$/\1/')
            cp "$f" "dist/LiveTranslate-${NAME}-${abi}.apk"
          done
          count=$(find dist -name '*.apk' | wc -l | tr -d ' ')
          if [ "$count" -lt 1 ]; then
            echo "No APKs under app/build/outputs/apk/release/"
            ls -laR app/build/outputs/apk || true
            exit 1
          fi
          ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.artifact_name }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Job summary
        run: |
          {
            echo "### Build OK"
            echo ""
            echo "- **versionName:** \`${{ steps.ver.outputs.version_name }}\`"
            echo "- **versionCode:** \`${{ steps.ver.outputs.version_code }}\`"
            echo "- **commit:** \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Unique tag per commit so every master push can publish without clashing.
          tag_name: v${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.short_sha }}
          name: v${{ needs.build.outputs.version_name }} (${{ needs.build.outputs.short_sha }})
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*.apk
          body: |
            Continuous build from `master`.

            | | |
            |---|---|
            | **versionName** | `${{ needs.build.outputs.version_name }}` |
            | **versionCode** | `${{ needs.build.outputs.version_code }}` |
            | **commit** | `${{ github.sha }}` |

            ### Install
            - Phone (arm64): download `LiveTranslate-*-arm64-v8a.apk`
            - Emulator (x86): download `LiveTranslate-*-x86.apk`

            Release APKs are signed with the **debug keystore** (sideload only). See README for setup (ASR / LLM API keys).

            ### Verify
            ```text
            package: com.example.livetranslate
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
